      maxAltitude: 1680
      elevationGain: 1950
      defaultMeetingPoint: "石家庄站东广场"
      sceneryTags: ["峡谷", "山脉", "乡村公路"]
      suitableMonths: ["4月", "5月", "9月", "10月"]
      riskLevel: "中"

